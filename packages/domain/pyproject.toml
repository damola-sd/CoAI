[project]
name = "coai-domain"
version = "0.1.0"
description = "Shared domain models/schemas for codebase-onboarding-ai (scaffold)"
requires-python = ">=3.10"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coai_domain"]

