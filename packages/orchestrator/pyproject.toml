[project]
name = "coai-orchestrator"
version = "0.1.0"
description = "LangGraph workflows/orchestration layer (scaffold)"
requires-python = ">=3.10"
dependencies = [
  "langgraph>=0.2",
  "openai>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coai_orchestrator"]

