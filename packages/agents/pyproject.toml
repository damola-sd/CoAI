[project]
name = "coai-agents"
version = "0.1.0"
description = "LangGraph agents (scaffold)"
requires-python = ">=3.10"
dependencies = [
  "langgraph>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coai_agents"]

