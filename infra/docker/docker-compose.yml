services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: coai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codebase_onboarding}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - coai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: coai-backend
    environment:
      COAI_ENVIRONMENT: ${COAI_ENVIRONMENT:-local}
      COAI_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-codebase_onboarding}
      COAI_EMBEDDINGS_PROVIDER: ${COAI_EMBEDDINGS_PROVIDER:-fake}
      COAI_OPENAI_API_KEY: ${COAI_OPENAI_API_KEY:-}
      COAI_OPENAI_MODEL: ${COAI_OPENAI_MODEL:-gpt-4.1-mini}
      COAI_OPENAI_EMBEDDINGS_MODEL: ${COAI_OPENAI_EMBEDDINGS_MODEL:-text-embedding-3-small}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../
      dockerfile: apps/frontend/Dockerfile
    container_name: coai-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  coai_postgres_data:

